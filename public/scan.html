<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bank Details | Secure Display</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-elements">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>
    
    <div class="container" style="display: flex; justify-content: center;">
        
        <!-- Loading State -->
        <div id="loaderState" class="scan-card">
            <div class="full-loader">
                <div class="loader"></div>
                <h2>Securing Details...</h2>
                <p style="color: var(--text-secondary); margin-top: 10px;">Fetching bank information from secure server.</p>
            </div>
        </div>

        <!-- Error State -->
        <div id="errorState" class="scan-card" style="display: none; text-align: center;">
            <svg style="width: 60px; height: 60px; color: var(--error-color); margin: 0 auto 1.5rem auto;" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
            <h2 style="color: var(--error-color); margin-bottom: 1rem;">Link Expired or Invalid</h2>
            <p id="errorMsg" style="color: var(--text-secondary); margin-bottom: 2rem;">The details you are looking for could not be found.</p>
            <a href="/" class="btn-primary" style="text-decoration: none; display: inline-flex;">Create New QR Code</a>
        </div>

        <!-- Success Details View -->
        <div id="detailsState" class="scan-card" style="display: none;">
            <header style="margin-bottom: 1.5rem;">
                <h1 style="font-size: 1.8rem;">Bank Details</h1>
                <p>Verified Information</p>
            </header>

            <div class="details-list" id="detailsList">
                <!-- Details injected here by JS -->
            </div>

            <button class="btn-primary" id="copyAllBtn">
                <svg style="width: 20px; height: 20px;" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                Copy All Details
            </button>
        </div>

    </div>

    <div class="copy-success" id="copySuccessToast">
        Details copied to clipboard!
    </div>

    <script src="scan.js"></script>
</body>
</html>
